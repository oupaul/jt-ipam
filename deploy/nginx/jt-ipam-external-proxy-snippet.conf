# =============================================================================
# jt-ipam — nginx proxy snippet（外部反向代理模式）
#
# 用於 jt-ipam-external-proxy.conf，搭配外部 NGINX 做 SSL 終結的部署。
#
# 關鍵差異（vs 原 jt-ipam-proxy.conf）：
#   X-Forwarded-Proto 傳遞 $http_x_forwarded_proto 而非 $scheme
#
#   原因：本機 nginx 接收的是 HTTP，$scheme 恆為 "http"。
#   若傳 $scheme，FastAPI 的 session cookie 會以 http 判斷協定，
#   導致 Secure cookie 驗證失敗（OIDC callback 500 / 登入失敗）。
#   正確做法：讀取外部 NGINX 傳入的 X-Forwarded-Proto header 往後傳。
# =============================================================================
proxy_set_header Host               $host;
proxy_set_header X-Real-IP          $remote_addr;
proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;   # ← 外部代理模式的關鍵設定

proxy_http_version 1.1;
proxy_set_header Connection "";
proxy_read_timeout 90s;
proxy_connect_timeout 5s;
proxy_send_timeout 60s;
proxy_buffering off;
