# =============================================================================
# jt-ipam — nginx site（外部反向代理模式）
#
# 使用情境：
#   前端另有一台 NGINX 負責 SSL 終結，本機 NGINX 僅做 HTTP 服務。
#   外部 NGINX → HTTP:80 → 本機 NGINX → loopback → FastAPI
#
# 安裝步驟：
#   sudo cp deploy/nginx/jt-ipam-external-proxy.conf /etc/nginx/sites-available/jt-ipam
#   sudo cp deploy/nginx/jt-ipam-external-proxy-snippet.conf /etc/nginx/snippets/jt-ipam-proxy.conf
#   sudo ln -s /etc/nginx/sites-available/jt-ipam /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 注意：HSTS 必須由外部 NGINX（持有憑證的那台）負責送出，本機不應送出。
# =============================================================================
server_tokens off;

limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=1200r/m;

map $sent_http_content_type $expires {
    default                 off;
    text/html               -1;
    ~image/                 30d;
    ~font/                  30d;
    application/javascript  7d;
    text/css                7d;
}

limit_req_status 429;

# ─────────────────────────────────────────────────────────────────────────────
# HTTP（明文，專用埠 8088）— 只服務 Graylog DSV 對照表（保留原設定）
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 8088;
    listen [::]:8088;
    server_name _;

    location /api/v1/lookup/ {
        limit_req zone=api burst=80 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }
    location / { return 404; }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP port 80 — 接收外部 NGINX 轉發的流量（SSL 已由外部 NGINX 終結）
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Security headers（A05）──
    # 注意：HSTS 不在此送出，由外部 NGINX 負責
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org; font-src 'self' data:; connect-src 'self'; frame-src 'self' https://www.openstreetmap.org https://www.google.com https://maps.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # ── Frontend（Vite build 後的靜態檔）──
    root /opt/jt-ipam/frontend/dist;
    index index.html;
    expires $expires;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ── 反代 API：套限流 ──
    location /api/phpipam/user/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }

    location /api/ {
        limit_req zone=api burst=80 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 阻擋常見隱私洩漏路徑 ──
    location ~ /\.(env|git|svn|hg|DS_Store) {
        deny all;
        access_log off;
        return 404;
    }

    # ── 限制請求大小（A04）──
    client_max_body_size 16m;
    client_body_timeout 30s;
    client_header_timeout 30s;
}
