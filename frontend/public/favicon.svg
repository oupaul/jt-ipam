<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="jt-ipam">
  <!-- 圓角綠底 -->
  <rect width="64" height="64" rx="14" fill="#18a058"/>
  <!-- 連線：4 個 endpoint → 中央 hub（IPAM 核心隱喻） -->
  <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9">
    <line x1="18" y1="18" x2="32" y2="32"/>
    <line x1="46" y1="18" x2="32" y2="32"/>
    <line x1="18" y1="46" x2="32" y2="32"/>
    <line x1="46" y1="46" x2="32" y2="32"/>
  </g>
  <!-- 4 個 endpoint 節點 -->
  <g fill="#ffffff">
    <circle cx="18" cy="18" r="5"/>
    <circle cx="46" cy="18" r="5"/>
    <circle cx="18" cy="46" r="5"/>
    <circle cx="46" cy="46" r="5"/>
  </g>
  <!-- 中央 hub 節點（管控中心） -->
  <circle cx="32" cy="32" r="8" fill="#ffffff"/>
  <circle cx="32" cy="32" r="3.5" fill="#18a058"/>
</svg>
